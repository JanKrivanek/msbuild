name: Test Self-Approve

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  self-approve:
    runs-on: ubuntu-latest
    steps:
      - name: Approve PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Attempting to approve PR #${{ github.event.pull_request.number }}"
          gh pr review ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --approve --body "Auto-approved by GitHub Action"
          echo "Exit code: $?"
